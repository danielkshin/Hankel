<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hankel</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/konva@9.2.0/konva.min.js"></script>
</head>

<body>
    <div>
        Hankel: a soccer planner.
    </div>
    <div class="break"></div>
    <div class="editor">
        <div class="playersContainer">
            <div class="players" id="team1"></div>
            <div class="players" id="team2"></div>
            <div class="players" id="gk"></div>
        </div>
        <div>
            <div id="planner"></div>
            <div class="break"></div>
            <div id="pitches"></div>
        </div>
        <div id="tools"> <input type="color" class="tool" id="colorPicker" /></div>
        <div id="equipments"></div>
    </div>
    <div class="break"></div>
    <div class="Notes">
        <input type="text" id="name" name="name" placeholder="Type here..." minlength="0" maxlength="500" size="185"
            style="padding-bottom: 300px;" />
    </div>
    <input type="checkbox" id="notesOption">
    <label for="notesOption">Include notes</label>

    <script src="script.js"></script>
</body>

</html>
