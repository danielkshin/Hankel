<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hankel</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="assets/icon.png" />
    <script src="https://unpkg.com/konva@9.2.0/konva.min.js"></script>
</head>

<body>
    <div>
        Hankel: A soccer planner.
    </div>
    <div class="break"></div>
    <div class="editor">
        <div class="playersContainer">
            <div class="players" id="team1"></div>
            <div class="players" id="team2"></div>
            <div class="players" id="gk"></div>
        </div>
        <div>
            <div id="planner"></div>
            <div class="break"></div>
            <div id="pitches"></div>
        </div>
        <div id="tools">
            <input type="color" class="tool" id="colorPicker" />
            <input id="uploadFile" type="file" accept=".json" hidden />
        </div>
        <div id="equipments"></div>
    </div>
    <div class="break"></div>
    <div>
        <textarea type="text" id="notesInput" placeholder="Type notes..."></textarea>
    </div>
    <div class="break"></div>
    <input type="checkbox" id="notesOption">
    <label for="notesOption">Include notes in image</label>
    <script src="script.js"></script>
</body>

</html>
